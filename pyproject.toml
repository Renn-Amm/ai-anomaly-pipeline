[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
]
ignore = [
    "S101",  # assert used in tests — expected
    "B008",  # FastAPI Depends() in function signatures
    "N803",  # UUID argument names (batch_id etc.)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "N"]  # relax security & naming rules in tests

[tool.ruff.lint.isort]
known-first-party = ["app"]
