[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

markers =
    unit: Pure unit tests (no I/O)
    integration: Tests that spin up the FastAPI app
    slow: Tests that take > 1 second
