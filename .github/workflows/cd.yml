name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  # ── Publish Docker Image ───────────────────────────────────────────────────────
  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [publish]
    environment:
      name: staging
      url: https://staging.your-domain.com
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.publish.outputs.image-tag }} to staging"
          # Replace this with your actual deploy command, e.g.:
          # ssh deploy@staging-host "docker pull $IMAGE && docker-compose up -d"
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.image-tag }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}

      - name: Smoke test staging
        run: |
          sleep 10  # wait for container to start
          echo "Smoke test: replace URL below with real staging endpoint"
          # curl -f https://staging.your-domain.com/health

  # ── Deploy to Production ──────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: https://your-domain.com
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.publish.outputs.image-tag }} to production"
          # Add your production deploy command here
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.image-tag }}
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}